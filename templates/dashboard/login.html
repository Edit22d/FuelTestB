<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fuel Connect Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0D0D0D;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1A1A1A 0%, #0D0D0D 100%);
        }

        .login-container {
            background: #1A1A1A;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(196, 150, 61, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #C4963D, #D4A84D);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: #0D0D0D;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #C4963D, #D4A84D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header p {
            color: #888888;
            font-size: 14px;
            margin-top: 4px;
            -webkit-text-fill-color: #888888;
        }

        {% if messages %}
        .messages {
            margin-bottom: 20px;
        }
        .messages .error {
            background: rgba(255, 68, 68, 0.1);
            color: #FF4444;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 68, 68, 0.2);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        {% endif %}

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #888888;
            margin-bottom: 6px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #555555;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #242424;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #C4963D;
            box-shadow: 0 0 30px rgba(196, 150, 61, 0.08);
            background: #2A2A2A;
        }

        .form-group input::placeholder {
            color: #555555;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .form-options label {
            color: #888888;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            accent-color: #C4963D;
            width: 16px;
            height: 16px;
        }

        .form-options a {
            color: #C4963D;
            text-decoration: none;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #C4963D, #D4A84D);
            color: #0D0D0D;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(196, 150, 61, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-footer p {
            color: #555555;
            font-size: 13px;
        }

        .login-footer a {
            color: #C4963D;
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .login-footer .version {
            margin-top: 8px;
            font-size: 11px;
            color: #333333;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
                margin: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fas fa-gas-pump"></i>
            </div>
            <h1>Fuel Connect</h1>
            <p>Dashboard Administration</p>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="error">
                <i class="fas fa-exclamation-circle"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'dashboard_login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" id="id_username" placeholder="Enter your username" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="id_password" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <div class="login-footer">
            <p>Don't have an account? <a href="/admin/">Contact Administrator</a></p>
            <div class="version">
                <i class="fas fa-shield-alt" style="color: #C4963D;"></i> Secure Dashboard v2.0
            </div>
        </div>
    </div>
</body>
</html>
