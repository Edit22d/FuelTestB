{% for station in stations %}
<tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-750">
    <td class="p-4 dark:text-white">{{ station.name }}</td>
    <td class="p-4 dark:text-white">{{ station.location }}</td>
    <td class="p-4 flex gap-2">
        <button hx-get="{% url 'dashboard:station_update' station.id %}" 
                hx-target="#modal-container" 
                class="text-blue-600 hover:underline">Edit</button>
        {% if request.user.groups.filter.name__in='super_admin,sub_admin' %}
        <button hx-delete="{% url 'dashboard:station_delete' station.id %}" 
                hx-target="#stations-table" 
                hx-confirm="Delete this station?"
                class="text-red-600 hover:underline">Delete</button>
        {% endif %}
    </td>
</tr>
{% empty %}
<tr><td colspan="3" class="p-4 text-center dark:text-gray-400">No stations found</td></tr>
{% endfor %}
