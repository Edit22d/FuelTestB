{% extends 'dashboard/base.html' %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold dark:text-white">Fuel Stations</h1>
    <button hx-get="{% url 'dashboard:station_create' %}" 
            hx-target="#modal-container" 
            hx-swap="innerHTML"
            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        + Add Station
    </button>
</div>

<div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
    <table class="w-full text-left">
        <thead class="bg-gray-100 dark:bg-gray-700">
            <tr>
                <th class="p-4">Name</th>
                <th class="p-4">Location</th>
                <th class="p-4">Actions</th>
            </tr>
        </thead>
        <tbody id="stations-table">
            {% include 'dashboard/partials/table_body.html' %}
        </tbody>
    </table>
</div>

<!-- Modal Container -->
<div id="modal-container" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
</div>
{% endblock %}
