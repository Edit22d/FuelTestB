{% load static dashboard_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}FuelConnect Dashboard{% endblock %}</title>

<link rel="stylesheet" href="{% static 'dashboard/css/main.css' %}">

<!-- HTMX -->
<script src="https://unpkg.com/htmx.org@1.9.10"></script>

<!-- React + ReactDOM + Babel for JSX (development only) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Import Map for ES modules -->
<script type="importmap">
{
    "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react"
    }
}
</script>

{% block extra_head %}{% endblock %}
</head>

<body hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'>

<div id="root"></div>

<!-- Django Context -->
<script id="django-context" type="application/json">
{
    "user": {
        "name": "{{ user.get_full_name|default:user.username|escapejs }}",
        "initials": "{{ user.username|make_initials|default:'JD'|escapejs }}",
        "role": "{{ user.role|default:'super_admin'|escapejs }}",
        "is_authenticated": {% if user.is_authenticated %}true{% else %}false{% endif %}
    },
    "csrf_token": "{{ csrf_token|escapejs }}"
}
</script>

<!-- Theme & Config -->
<script type="module" src="{% static 'dashboard/js/theme.js' %}"></script>
<script type="module" src="{% static 'dashboard/js/config.js' %}"></script>

<!-- Main React App -->
<script
    type="text/babel"
    data-type="module"
    src="{% static 'dashboard/js/FuelConnect.jsx' %}">
</script>

<!-- Mount React App -->
<script type="text/babel">
const root = ReactDOM.createRoot(document.getElementById('root'));

const ctx = JSON.parse(
    document.getElementById('django-context').textContent
);

root.render(
    <FuelConnect
        userName={ctx.user.name}
        userInitials={ctx.user.initials}
        userRole={ctx.user.role}
        isAuthenticated={ctx.user.is_authenticated}
    />
);
</script>

{% block extra_js %}{% endblock %}

</body>
</html>
