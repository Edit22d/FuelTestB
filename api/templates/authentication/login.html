<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FuelConnect</title>
</head>
<body>
    <h2>Login</h2>
    
    {% if form.errors %}
        <div style="color: red;">Invalid phone number or password</div>
    {% endif %}
    
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div>
            <label for="username">Phone Number:</label>
            <input type="text" id="username" name="username" placeholder="Enter your phone number" required>  <!-- Django expects 'username' -->
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    
    <p><a href="/api/v1/auth/forgot-password/">Forgot Password?</a></p>
    <p><a href="/register/">Create Account</a></p>
</body>
</html>
